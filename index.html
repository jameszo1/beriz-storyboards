<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>베리즈 스토리보드</title>
  <style>
    body { font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif; background: #FBFBFB; color: #2B2B2B; max-width: 720px; margin: 0 auto; padding: 56px 24px; line-height: 1.6; }
    h1 { font-size: 24px; font-weight: 800; }
    p.sub { color: #8C8C8C; margin: 6px 0 32px; }
    a.card { display: block; border: 1px solid #E3E3E3; border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; text-decoration: none; color: inherit; background: #fff; transition: border-color .15s; }
    a.card:hover { border-color: #5B5B5B; }
    a.card .name { font-size: 16px; font-weight: 700; }
    a.card .desc { font-size: 13px; color: #8C8C8C; margin-top: 4px; }
    .foot { margin-top: 28px; font-size: 12px; color: #B0B0B0; }
  </style>
</head>
<body>
  <h1>베리즈 스토리보드</h1>
  <p class="sub">와이어프레임 + 화면 설명서 (사람용 화면 · AI용 데이터 동일 원본)</p>

  <a class="card" href="mobile-ticket/">
    <div class="name">모바일 티켓</div>
    <div class="desc">예매한 티켓을 모바일로 제시 · 입장. 1개 예매번호에 여러 매.</div>
  </a>

  <p class="foot">새 화면은 폴더 + storyboard.json 한 장으로 추가됩니다.</p>
</body>
</html>
